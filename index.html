<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Catálogo 3D</title>

  <!-- Visor 3D -->
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
    }

    header {
      text-align: center;
      padding: 15px;
      background: #000;
      font-size: 20px;
    }

    .container {
      display: grid;
      grid-template-columns: 250px 1fr;
      height: calc(100vh - 60px);
    }

    .sidebar {
      background: #1a1a1a;
      padding: 10px;
      overflow-y: auto;
    }

    .item {
      padding: 10px;
      margin-bottom: 8px;
      background: #2a2a2a;
      cursor: pointer;
      border-radius: 6px;
      transition: 0.2s;
    }

    .item:hover {
      background: #444;
    }

    .viewer {
      position: relative;
    }

    model-viewer {
      width: 100%;
      height: 100%;
      background: #222;
    }

    .title {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.6);
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 16px;
    }
  </style>
</head>

<body>

<header>
  Catálogo de Modelos 3D
</header>

<div class="container">

  <!-- LISTA DE MODELOS -->
  <div class="sidebar">

    <div class="item" onclick="cambiarModelo('Rompeolas Amarillo', 'https://ksitigarbha99.github.io/modelos-3D/piedrablanca.glb')">
      Modejlo 1
    </div>

    <div class="item" onclick="cambiarModelo('Muro Piedra Amarilla', 'https://ksitigarbha99.github.io/modelos-3D/sample.glb')">
      Modelo 2
    </div>

    <div class="item" onclick="cambiarModelo('Muro Piedra Blanca', 'https://ksitigarbha99.github.io/modelos-3D/rompeolasamarillo.glb')">
      Modelo 3
    </div>

  </div>

  <!-- VISOR -->
  <div class="viewer">

    <div class="title" id="tituloModelo">Modelo 1</div>

    <model-viewer 
      id="visor"
      src="https://ksitigarbha99.github.io/modelos-3D/sample.glb"
      auto-rotate
      camera-controls
      exposure="1"
      shadow-intensity="1">
    </model-viewer>

  </div>

</div>

<script>
  function cambiarModelo(nombre, url) {
    document.getElementById("visor").src = url;
    document.getElementById("tituloModelo").innerText = nombre;
  }
</script>

</body>
</html>
